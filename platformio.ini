; PlatformIO Project Configuration File
; SlopDrive-32 - Buttplug v4 Stroke Machine Controller

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
	teemuatlut/TMCStepper@^0.7.3
	gin66/FastAccelStepper@^0.30.4
	adafruit/Adafruit NeoPixel@^1.11.0
	bblanchon/ArduinoJson@^7.2.0
	links2004/websockets@^2.4.1
	h2zero/NimBLE-Arduino@^1.4.2

upload_port = \\.\COM3
monitor_speed = 115200
board_build.f_cpu = 240000000L
build_flags = -O2 -Iinclude/system -Iinclude/motion -Iinclude/comms -Iinclude/ui
build_unflags = -Og

; --- Web UI served from a LittleFS filesystem partition (best practice) ---
; The HTML/CSS/JS live in the data/ folder and are flashed as a separate
; filesystem image, NOT compiled into the firmware. This keeps the firmware
; small, lets you edit the UI without recompiling C++, and is the standard
; ESP32 approach. Use the PlatformIO "Upload Filesystem Image" task (or
; `pio run -t uploadfs`) to push data/ to the device.
board_build.filesystem = littlefs
; 8MB flash layout with a large filesystem partition for the web assets.
board_build.partitions = default_8MB.csv

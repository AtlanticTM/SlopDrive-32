# SlopSync golden-vector manifest (slopsync/1) — NORMATIVE as to coverage (SPEC.md §17.2, Appendix F)
#
# Byte-exact vector files (*.bin + *.expected.yaml) are GENERATED by slopsync-core
# tooling once it exists, using the injected clock/RNG mandated by SPEC.md §17.2,
# from the fixed inputs defined here. This manifest defines WHAT must be covered
# and the exact inputs; the generated bytes become normative when tagged.
#
# Fixed identities used by every vector (arbitrary but frozen forever):
fixtures:
  hub_boot_id: 0xB007CAFE
  hub_time_origin_us: 1000000            # injected clock starts here
  session_id: 0x5E551D01
  instance_id: "0102030405060708"        # hex
  token: "000102030405060708090A0B0C0D0E0F"
  nonce: "A1A2A3A4A5A6A7A8"
  pin: "4821"
  catalog: "fixtures/mini-catalog.yaml"  # 6-entry catalog exercising every field type,
                                         # both layout and schema forms, one bitfield8

suites:
  header:
    - id: H-01  # encode/decode every frame type's header, seq 0 and 0xFFFF
    - id: H-02  # len bounds: 0, 242, 65535; FRAME_TOO_LARGE behavior
    - id: H-03  # unknown frame type 0x7A skipped without disconnect (SPEC §4.3)
    - id: H-04  # flags: reserved bits set on receive -> ignored

  cbor_profile:
    - id: C-01  # HELLO minimal (viewer, no token) — exact bytes
    - id: C-02  # HELLO full (token, etag, wish-lists) — exact bytes, sorted keys
    - id: C-03  # WELCOME with grants, limits, nonce — exact bytes
    - id: C-04  # profile violations rejected: indefinite length, unsorted keys,
                #   float64, tag present -> PROFILE_VIOLATION (decode direction)
    - id: C-05  # unknown map key 99 ignored (SPEC §4.3)
    - id: C-06  # canned-template equivalence: template-patched HELLO == encoder HELLO

  catalog:
    - id: K-01  # mini-catalog deterministic encoding — exact bytes
    - id: K-02  # etag computation over K-01 bytes — exact 8-byte value
    - id: K-03  # chunking at 192B: chunk boundaries, indices, reassembly
    - id: K-04  # selective repair: request chunks [1,3], receive, complete
    - id: K-05  # etag mismatch -> static-profile degraded-mode decision table (SPEC §8.5)

  state_stream:
    - id: D-01  # STATE snapshot encode/decode for each mini-catalog layout
    - id: D-02  # newest-wins: seq 10 then 9 -> 9 dropped; wraparound 0xFFFE..0x0001
    - id: D-03  # STATE fit rule: 243-byte layout -> conformance tooling MUST flag
    - id: D-04  # STREAM bundle: 5 samples @240Hz (span 16.7ms < 20ms cap), t_base/t_off exactness
    - id: D-05  # bundle caps: 33 samples / 21ms span / MTU overflow all rejected
    - id: D-06  # append-only evolution: reader with short layout parses long payload prefix

  intent_echo:
    - id: I-01  # INTENT set-speed 420 -> ECHO applied 400 (clamp), cfg_gen bump
    - id: I-02  # duplicate intent_id -> identical stored ECHO, no re-apply
    - id: I-03  # precondition cfg_gen mismatch -> NACK CONFLICT
    - id: I-04  # NACK safety range: NOT_HOMED refusal on move intent

  estop:
    - id: E-01  # ESTOP frame bytes: cause/origin/seq/CRC — exact 12 bytes
    - id: E-02  # magic scanner: detect at offsets 0..3 in a byte stream; CRC reject
    - id: E-03  # COBS interaction: ESTOP inside COBS frame; corrupt-stream raw scan
    - id: E-04  # repeat-until-latch: 30% injected loss, latch observed within budget

  session_behavior:  # run against in-process binding, deterministic mode (SPEC §13.6)
    - id: S-01  # cold connect -> retained push -> LIVE gate (SPEC §2.2, §6.3)
    - id: S-02  # reconnect: etag match skip; boot_id change forces full SYNCING
    - id: S-03  # reconnect reconcile: pending intent NOT retransmitted (SPEC §6.7)
    - id: S-04  # duplicate instance_id evicts old session
    - id: S-05  # deadman: streamer silent 600ms -> STOP latched, cause=deadman
    - id: S-06  # deadman: pattern initiator lost -> pattern continues, ownership released
    - id: S-07  # takeover: SOURCE_CONFLICT then takeover=true transfer + event
    - id: S-08  # shed order under congestion: background stream decimates before
                #   elevated; safety STATE never sheds; slow-consumer eviction
    - id: S-09  # unsolicited GRANT on second client join; client complies
    - id: S-10  # pairing: PIN proof HMAC exact bytes; wrong PIN -> PAIRING_DENIED;
                #   3 failures close window

  clock:
    - id: T-01  # CLOCK t0/t1/t2 exchange: offset & RTT math — exact values
    - id: T-02  # µs wraparound: t_base near 0xFFFFFFFF interpreted in ±35min window

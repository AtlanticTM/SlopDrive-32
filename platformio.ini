; PlatformIO Project Configuration File
; SlopDrive-32 - Stroke Machine Controller

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
	teemuatlut/TMCStepper@^0.7.3
	gin66/FastAccelStepper@^0.30.4
	adafruit/Adafruit NeoPixel@^1.11.0
	bblanchon/ArduinoJson@^7.2.0
	links2004/websockets@^2.4.1
	h2zero/NimBLE-Arduino@~1.4.3

upload_port = \\.\COM3
monitor_speed = 115200
upload_speed = 1500000
board_build.f_cpu = 240000000L
build_flags =
	-O2
	-Iinclude/system
	-Iinclude/motion
	-Iinclude/comms
	-Iinclude/ui
	-DDRIVER_TMC2160
	-DBLE_ENABLED
	; ---- USB Serial backend: STAY ON THE USB-Serial/JTAG PERIPHERAL ----
	; DO NOT add -DARDUINO_USB_MODE=1 / -DARDUINO_USB_CDC_ON_BOOT=1 here.
	;
	; A previous "cleanup" added those two flags, which flipped `Serial` over to
	; the native USB-OTG TinyUSB CDC stack. That stack tears down and re-enumerates
	; on every DTR assert/deassert — i.e. every time MultiFunPlayer / Intiface opens
	; or closes the port. Any Serial.read()/print() touching the device mid-teardown
	; panics the chip → the exact "crashes on connect and disconnect" bug, plus the
	; re-enumeration changes the USB PID so the host often fails to even detect the
	; port. uhoh. :C
	;
	; With the flags ABSENT (as on the rock-solid main branch) the S3 uses its
	; hardware USB-Serial/JTAG bridge for `Serial`. That endpoint is stable across
	; host open/close — no teardown, no phantom panic, and a steady COM port the
	; host can find every time. We're keeping the golden hose plugged into the
	; reliable socket. :3




build_unflags = -Og

; --- Web UI served from a LittleFS filesystem partition (best practice) ---
; The HTML/CSS/JS live in the data/ folder and are flashed as a separate
; filesystem image, NOT compiled into the firmware. This keeps the firmware
; small, lets you edit the UI without recompiling C++, and is the standard
; ESP32 approach. Use the PlatformIO "Upload Filesystem Image" task (or
; `pio run -t uploadfs`) to push data/ to the device.
extra_scripts = pre:build_webui.py
board_build.filesystem = littlefs
; 8MB flash layout with a large filesystem partition for the web assets.
; The partition uses the spiffs subtype — PlatformIO handles LittleFS formatting
; on top of it via board_build.filesystem = littlefs. :3
board_build.partitions = default_8MB.csv

targets = uploadfs, upload

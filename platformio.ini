; PlatformIO Project Configuration File
; SlopDrive-32 - Multi-Device Machine Network
;
; This single workspace manages firmware for three separate ESP32 boards:
;   1. Main Controller:        Arduino Nano ESP32 (u-blox NORA-W106 / ESP32-S3)
;   2. Node A (Receiver):      Waveshare ESP32-C5-Zero
;   3. Node B (Transmitter):   ESP32-C5 (LilyGO T-Dongle C5)
;
; Board note (custom v0.0 controller PCB):
;   The main controller is NOT a bare devkit — it's an Arduino Nano ESP32 module
;   (16MB flash, 8MB PSRAM, NORA-W106). The C5 relay node is the tiny C5-Zero,
;   not the full-size Waveshare devkit. We keep the plain esp32s3/esp32c5
;   VARIANTS (raw-GPIO numbering) because config_api.h passes raw GPIO integers
;   straight to pinMode()/Wire.begin() — the Nano's Dx→GPIO remap layer would
;   only bite if we wrote D2/D3 literals, which we never do. :3
;
; All three environments share the lib/SharedProtocol/ library.  Each environment
; uses build_src_filter to compile ONLY its own src/<node>/ folder, keeping the
; three firmware images strictly isolated while living in one project.
;
; PLATFORM ISOLATION STRATEGY:
;   - S3 environments use the stable production `espressif32` platform from the
;     PlatformIO registry. No dev packages, no surprises. Rock solid. :3
;   - C5 environments use the `pioarduino` community fork of platform-espressif32,
;     which is the ONLY platform that actually ships ESP32-C5 support in a stable
;     release ZIP. The official platformio/platform-espressif32 lags badly on C5.
;     No platform_packages override is needed — the pioarduino ZIP bundles the
;     correct arduino-esp32 framework version (v3.x / IDF v5.x) that includes C5.
;
; LIBRARY ISOLATION STRATEGY:
;   - S3 environments use [common_s3_libs] which includes FastAccelStepper, NimBLE,
;     WebSockets, NeoPixel, and ArduinoJson.
;   - C5 environments use [common_c5_libs] which only includes ArduinoJson.
;     FastAccelStepper explicitly throws #error on unsupported MCU derivatives
;     (ESP32-C5 is not yet supported), so it MUST NOT be included in C5 builds.
;     The C5 nodes are lean communication nodes — no steppers, no BLE, no pixels.

; -----------------------------------------------------------------------------
; Common defaults used by every environment.
; -----------------------------------------------------------------------------
[platformio]
default_envs = s3_main
src_dir = src
lib_dir = lib
data_dir = data

; -----------------------------------------------------------------------------
; -----------------------------------------------------------------------------
[common]
framework = arduino
monitor_speed = 115200
upload_speed = 1500000

; S3-only libraries — do NOT inherit these into C5 environments.
; FastAccelStepper, NimBLE, WebSockets, and NeoPixel all fail on ESP32-C5.
; FAS 0.34.0 is the first release with IDF 5.x RMT/MCPWM register fixes —
; 0.30.x blows up on conf_update_n / RMTMEM / gpio_matrix_out with IDF 5.5.x.
; Pin to 0.34.0 so we don't accidentally regress if 1.x breaks something. :3
[common_s3_libs]
lib_deps =
	gin66/FastAccelStepper@0.34.0
	adafruit/Adafruit NeoPixel@^1.11.0
	bblanchon/ArduinoJson@^7.2.0
	links2004/websockets@^2.4.1
	h2zero/NimBLE-Arduino@~1.4.3
	; INA228 20-bit current/voltage monitor on the 36V bus (custom v0.0 board).
	; NOT an INA226 lib — the register map differs. Feeds sensorless homing. :3
	robtillaart/INA228@^0.3.0


; C5 nodes only need ArduinoJson for lightweight packet parsing — no steppers,
; no BLE stack, no NeoPixel. Keeping it lean so the C5 doesn't choke. yippie! :3
[common_c5_libs]
lib_deps =
	bblanchon/ArduinoJson@^7.2.0

; T-Dongle C5 display node — uses the bundled lib/lcd_st7735 driver (pure Arduino
; SPI, no register hacks, works on ESP32-C5). TFT_eSPI is NOT used here because
; it accesses chip-specific SPI registers (VSPI_HOST, SPI_MOSI_DLEN_REG) that
; don't exist on the C5's SPI peripheral. lcd_st7735 is in lib/ and is picked up
; automatically by PlatformIO's lib scanner — no lib_deps entry needed. :3
[tdongle_c5_libs]
lib_deps =
	bblanchon/ArduinoJson@^7.2.0

; =============================================================================
; S3 ENVIRONMENTS — stable production toolchain, do NOT add dev packages here
; =============================================================================

; -----------------------------------------------------------------------------
; [env:esp32-s3-devkitc-1] - Legacy main controller environment (kept for the
; existing S3 stroke-machine build that uses src/main.cpp and the src/comms/,
; src/motion/, src/system/, src/ui/ modules).
; -----------------------------------------------------------------------------
[env:esp32-s3-devkitc-1]
; Stable production platform — the golden hose plugged into the reliable socket :3
platform = espressif32
board = esp32-s3-devkitc-1
framework = ${common.framework}
lib_deps =
	${common_s3_libs.lib_deps}
	; teemuatlut/TMCStepper@^0.7.3  ; TMC2160 only — not needed for 57AIMServo build
upload_port = \\.\COM9
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
board_build.f_cpu = 240000000L
; LDF chain mode — must be explicit so uploadfs target doesn't fall back to
; LDF=off and lose WiFi.h / framework header discovery. :3
lib_ldf_mode = chain
; Exclude C5-only source trees — they use C5-specific registers (chip_rst,
; USB_SERIAL_JTAG) that don't exist on the S3 and cause compile errors. :3
build_src_filter = +<*> -<c5_waveshare/*> -<c5_tdongle/*> -<s3_main/*>
build_flags =
	-O2
	-Iinclude/system
	-Iinclude/motion
	-Iinclude/comms
	-Iinclude/ui
	-DDRIVER_57AIM_SERVO
	-DBLE_ENABLED
	-DFEATURE_RS485_MODBUS
	; ---- USB Serial backend: STAY ON THE USB-Serial/JTAG PERIPHERAL ----
	; DO NOT add -DARDUINO_USB_MODE=1 / -DARDUINO_USB_CDC_ON_BOOT=1 here.
	;
	; A previous "cleanup" added those two flags, which flipped `Serial` over to
	; the native USB-OTG TinyUSB CDC stack. That stack tears down and re-enumerates
	; on every DTR assert/deassert — i.e. every time MultiFunPlayer / Intiface opens
	; or closes the port. Any Serial.read()/print() touching the device mid-teardown
	; panics the chip → the exact "crashes on connect and disconnect" bug, plus the
	; re-enumeration changes the USB PID so the host often fails to even detect the
	; port. uhoh. :C
	;
	; With the flags ABSENT (as on the rock-solid main branch) the S3 uses its
	; hardware USB-Serial/JTAG bridge for `Serial`. That endpoint is stable across
	; host open/close — no teardown, no phantom panic, and a steady COM port the
	; host can find every time. We're keeping the golden hose plugged into the
	; reliable socket. :3
build_unflags = -Og

; --- Web UI served from a LittleFS filesystem partition (best practice) ---
; The HTML/CSS/JS live in the data/ folder and are flashed as a separate
; filesystem image, NOT compiled into the firmware. This keeps the firmware
; small, lets you edit the UI without recompiling C++, and is the standard
; ESP32 approach. Use the PlatformIO "Upload Filesystem Image" task (or
; `pio run -t uploadfs`) to push data/ to the device.
extra_scripts = pre:build_webui.py
board_build.filesystem = littlefs
; 8MB flash layout with a large filesystem partition for the web assets.
; The partition uses the spiffs subtype — PlatformIO handles LittleFS formatting
; on top of it via board_build.filesystem = littlefs. :3
board_build.partitions = default_8MB.csv

; targets = uploadfs, upload  ; commented out — use `pio run -t uploadfs -t upload`
;                               explicitly when the board is connected. Leaving this
;                               active causes `pio run` to fail with COM-not-found
;                               when building offline. :3

; -----------------------------------------------------------------------------
; [env:s3_main] - Main controller firmware for the custom v0.0 board.
;
; This is the REAL OS — identical source set + flags as the legacy
; esp32-s3-devkitc-1 env (src/main.cpp + src/comms/ + src/motion/ + src/system/
; + src/ui/, the full WebUI/WiFi/LittleFS/motion stack). The ONLY differences
; from legacy are board-specific: the Arduino Nano ESP32 board def, 16MB
; partitions, the USB-Serial flags the Nano needs, and the pinned COM port.
;
; The old src/s3_main/main.cpp stub is DELIBERATELY EXCLUDED — it defined its own
; setup()/loop() and would collide with src/main.cpp's. yippie! :3
; -----------------------------------------------------------------------------
[env:s3_main]

; Stable production platform — do NOT add pioarduino or dev packages here.
platform = espressif32
; Custom board def: boards/arduino-nano-esp32.json — the real v0.0 controller
; MCU is an Arduino Nano ESP32 (NORA-W106 / ESP32-S3, 16MB flash, 8MB PSRAM),
; NOT a bare devkit. Uses the plain esp32s3 variant so config_api.h's raw-GPIO
; pin numbers stay literal — no Dx remap surprises. :3
board = arduino-nano-esp32
framework = ${common.framework}
lib_deps = ${common_s3_libs.lib_deps}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
; Pin the port — the Nano ESP32 enumerates on COM11 here. Auto-detect otherwise
; grabs COM7 (an ESP32-C3) and esptool bails with "This chip is ESP32-C3, not
; ESP32-S3". Lock both upload + monitor so we never poke the wrong hole. :3
upload_port = COM11
monitor_port = COM11
board_build.f_cpu = 240000000L

; 16MB flash on the Nano ESP32 — give the WebUI/LittleFS room to stretch out. :3
board_build.partitions = default_16MB.csv

; LDF chain mode — same as legacy env, so uploadfs doesn't fall back to LDF=off
; and lose WiFi.h / framework header discovery during the FS image build. :3
lib_ldf_mode = chain

; FULL OS source set — identical to the legacy esp32-s3-devkitc-1 env: compile
; everything EXCEPT the C5 trees and the old s3_main/ stub (its setup()/loop()
; would collide with src/main.cpp's). This is the whole WebUI/WiFi/motion OS. :3
build_src_filter = +<*> -<c5_waveshare/*> -<c5_tdongle/*> -<s3_main/*>

; --- Web UI served from a LittleFS filesystem partition ---
; HTML/CSS/JS live in data/ and are flashed as a separate FS image, built by
; build_webui.py. Push with `pio run -e s3_main -t uploadfs`. Without this the
; web server has no files to serve and the browser gets nothing. uhoh :C
extra_scripts = pre:build_webui.py
board_build.filesystem = littlefs

build_flags =
	-O2
	-DNODE_ROLE_MAIN_CONTROLLER=1
	-DNODE_ROLE=0
	; Include paths + driver selection — MUST match legacy env or main.cpp and
	; the motion/comms/ui modules won't find their headers / driver impl. :3
	-Iinclude/system
	-Iinclude/motion
	-Iinclude/comms
	-Iinclude/ui
	-DDRIVER_57AIM_SERVO
	-DBLE_ENABLED
	-DFEATURE_RS485_MODBUS
	; Cap the arduinoWebSockets TCP block window (default 5000ms). A backed-up
	; client socket (slow/backgrounded/Tailscale-remote tab) makes sendBIN block
	; up to this long, and UiSocket holds the WS mutex the HTTP task needs during
	; that block — a 5s stall = the whole WebUI hangs. 1200ms keeps WAN
	; handshakes working while bounding any single stall. The defenses in
	; UiSocket are the real fix: the activity gate + send-stall mute keep wedged
	; clients out of the send loop, and _reapDeadClients() kills half-open
	; zombies. This cap matters because _ws.loop() (in the httpTask) still
	; services every connected socket — on a dead half-open client its ops must
	; not block long, or they starve HTTP AND keep the sender-task reaper from
	; getting the mutex to kill the zombie. 500ms is ample for a WS upgrade /
	; frame read over LAN or a direct Tailscale (WireGuard) link (~tens of ms
	; RTT) while keeping any single blocked op sub-second. :3
	-DWEBSOCKETS_TCP_TIMEOUT=500
	; ---- USB Serial on the Arduino Nano ESP32 (nano_nora) ----------------

	; PER ESPRESSIF boards.txt: the Nano ESP32 defaults to usb_mode=1
	; (ARDUINO_USB_MODE=1 = "Hardware CDC and JTAG", i.e. the USB-Serial/JTAG
	; peripheral / HWCDC) AND cdc_on_boot=1. We PIN both explicitly so the build
	; never depends on silent board defaults.
	;
	; This is the exact OPPOSITE of the legacy esp32-s3-devkitc-1 env, and the
	; distinction is the whole fix: the devkit has physical UART0 pins, so it
	; leaves Serial on UART0 and MUST NOT flip to USB. The Nano ESP32 exposes
	; NO broken-out UART0 — Serial HAS to ride the onboard USB. With
	; USB_MODE=1 that USB endpoint is the hardware USB-Serial/JTAG bridge
	; (HWCDC), which is STABLE across host open/close — no TinyUSB re-enumeration
	; teardown, so no crash-on-connect/disconnect. USB_MODE=0 (TinyUSB OTG CDC)
	; is the one that panics on every DTR toggle — we deliberately avoid it. :3
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
build_unflags = -Og


; =============================================================================
; OTA ENVIRONMENTS — network firmware + web-UI flashing for the main controller
; =============================================================================
;
; [env:sd32]      — serial/USB bench + rescue path. Behaves EXACTLY like s3_main
;                    (same source set, flags, COM port) but pins the vendored,
;                    OTA-capable partition table (partitions_ota.csv, byte-
;                    identical to default_16MB.csv so the one-time migration
;                    doesn't relocate NVS/LittleFS). Use this for the ONE cabled
;                    flash that installs the first OTA-able firmware, and later
;                    only for rescue (bootloop / WiFi-breaking change).
;
; [env:sd32-ota]  — the DEFAULT routine path. Same build as sd32, but uploads
;                    over the network via ArduinoOTA (espota) to the device IP.
;                      Firmware : pio run -e sd32-ota -t upload
;                      Web UI   : pio run -e sd32-ota -t uploadfs
;                    The OTA auth secret is NOT hardcoded here — tools/ota_auth.py
;                    reads SECRET_OTA_PASSWORD from include/secrets.h at build
;                    time and appends `--auth=<secret>` to the espota flags, so
;                    the password never lands in a committed file. :3
; -----------------------------------------------------------------------------
[env:sd32]
extends = env:s3_main
; Vendored OTA partition table (nvs + otadata + ota_0/ota_1 + spiffs + coredump).
; Byte-identical layout to default_16MB.csv → NVS + LittleFS survive the one-time
; serial migration that installs the first OTA-capable image.
board_build.partitions = partitions_ota.csv

[env:sd32-ota]
extends = env:sd32
; --- Network flashing over ArduinoOTA (espota) ---
upload_protocol = espota
; Device's usual address (works over Tailscale). Override on the CLI with
; `--upload-port <ip>` if it ever moves — never guess/port-scan (see .clinerules).
upload_port = 192.168.1.229
; extra_scripts is NOT inherited additively when redefined, so we re-list the
; web-UI builder AND add the auth-injection hook. ota_auth.py sources the secret
; from include/secrets.h so it stays out of git. :3
extra_scripts =
	pre:build_webui.py
	pre:tools/ota_auth.py

; =============================================================================
; C5 ENVIRONMENTS — pioarduino fork, isolated from S3 stable toolchain
;
; WHY pioarduino?
;   The official `platformio/platform-espressif32` registry package lags months
;   behind on new silicon support. The `pioarduino` fork is a community-maintained
;   drop-in replacement that tracks arduino-esp32 releases closely and ships
;   ESP32-C5 support in its stable release ZIPs. It is the de-facto standard for
;   cutting-edge ESP32 targets in PlatformIO as of 2025/2026.
;
;   Release 55.03.39 = Arduino ESP32 v3.3.9 / ESP-IDF v5.5.4 — the first stable
;   release with solid ESP32-C5 Arduino support. No platform_packages override
;   needed; the ZIP bundles the correct framework version. yippie! :3
; =============================================================================

; -----------------------------------------------------------------------------
; [env:c5_waveshare] - Node A receiver firmware for the onboard Waveshare
; ESP32-C5-Zero (the compact Zero board soldered to the v0.0 controller, NOT
; the full-size C5 devkit).  Compiles ONLY src/c5_waveshare/ plus the shared
; lib/SharedProtocol/ library.
;
; Custom board definition: boards/esp32-c5-zero.json
; (PlatformIO does not ship a first-party board for the Waveshare C5-Zero.)
; -----------------------------------------------------------------------------
[env:c5_waveshare]
; pioarduino stable release ZIP — contains ESP32-C5 Arduino framework support.
; Do NOT use the official platformio/platform-espressif32 here; it lacks C5.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-c5-zero
framework = arduino
lib_deps = ${common_c5_libs.lib_deps}

monitor_speed = ${common.monitor_speed}
; The C5-Zero flashes over its NATIVE USB-Serial/JTAG bridge. At 1.5Mbaud the
; stub-flasher handoff intermittently dies with "Failed to start stub flasher.
; Unexpected response: b''" — the JTAG bridge can't keep the pipe primed that
; fast during the ROM→stub transition. 460800 is rock-solid on native USB-JTAG.
; The S3 (real UART bridge) is fine at 1.5M; only the C5's onboard JTAG needs
; the gentler rate. Slow and steady gets it all the way in without gagging. :3
upload_speed = 460800
; C5-Zero enumerates on COM13 here (moved from COM8 after the reflash). :3
upload_port = COM13
monitor_port = COM13
board_build.f_cpu = 240000000L
build_src_filter = +<c5_waveshare/*>


build_flags =
	-O2
	-DNODE_ROLE_RECEIVER=1
	-DNODE_ROLE=1

; -----------------------------------------------------------------------------
; [env:c5_tdongle] - Node B transmitter firmware for the ESP32-C5 LilyGO
; T-Dongle C5.  Compiles ONLY src/c5_tdongle/ plus the shared
; lib/SharedProtocol/ library.
;
; Custom board definition: boards/lilygo-t-dongle-c5.json
; (PlatformIO does not yet ship a first-party board for the LilyGO T-Dongle C5.)
; -----------------------------------------------------------------------------
[env:c5_tdongle]
; pioarduino stable release ZIP — same version as c5_waveshare for consistency.
; Do NOT use the official platformio/platform-espressif32 here; it lacks C5.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = lilygo-t-dongle-c5
framework = arduino
; ArduinoJson only — the ST7735 display is driven by lib/lcd_st7735 (bundled,
; pure Arduino SPI). TFT_eSPI is gone — it used chip-specific SPI registers
; that don't exist on the C5. lcd_st7735 is auto-discovered from lib/. :3
lib_deps = ${tdongle_c5_libs.lib_deps}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
; Pin to COM6 — COM7 is an ESP32-C3 that auto-detect grabs by mistake. uhoh :C
upload_port = COM6
; Reset method is set in boards/lilygo-t-dongle-c5.json via upload.before_reset
; = usb_jtag_serial so esptool uses the correct USB-JTAG reset sequence. :3
board_build.f_cpu = 240000000L
build_src_filter = +<c5_tdongle/*>
build_flags =
	-O2
	-DNODE_ROLE_RECEIVER=1
	-DNODE_ROLE=1
	; REQUIRED: these flags map `Serial` to HWCDCSerial (USB-Serial/JTAG HWCDC).
	; WITHOUT them, Serial = Serial0 (UART0) which goes nowhere on a USB-only dongle.
	; The T-Dongle C5 has no physical UART pins — UART0 output is invisible to MFP.
	;
	; The DTR-triggered reset that previously caused crashes is now handled in
	; firmware via __attribute__((constructor)) setting chip_rst.usb_uart_chip_rst_dis=1
	; before app_main() runs. That disables the hardware reset circuit in the
	; USB-Serial/JTAG peripheral so MFP can open/close the port freely. yippie! :3
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	; Include path so secrets.h / secrets.example.h are found by main.cpp
	-Iinclude

; =============================================================================
; TEMPLATE ALIASES — env names matching the task specification template.
; These are thin aliases pointing to the same config as the canonical envs.
; Keeps the template names working without duplicating config. :3
; =============================================================================

; [env:esp32-c5-dev1] mirrors c5_waveshare (Node A receiver — C5-Zero)
[env:esp32-c5-dev1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-c5-zero
framework = arduino

lib_deps = ${common_c5_libs.lib_deps}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
board_build.f_cpu = 240000000L
build_src_filter = +<c5_waveshare/*>
build_flags =
	-O2
	-DNODE_ROLE_RECEIVER=1
	-DNODE_ROLE=1

; [env:esp32-c5-dev2] mirrors c5_tdongle (T-Dongle C5 display + ESP-NOW receiver)
[env:esp32-c5-dev2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = lilygo-t-dongle-c5
framework = arduino
; ArduinoJson only — lcd_st7735 is bundled in lib/ and auto-discovered. :3
lib_deps = ${tdongle_c5_libs.lib_deps}
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
board_build.f_cpu = 240000000L
build_src_filter = +<c5_tdongle/*>
build_flags =
	-O2
	-DNODE_ROLE_RECEIVER=1
	-DNODE_ROLE=1
	; REQUIRED: same as c5_tdongle — maps Serial to HWCDCSerial. :3
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	; Include path so secrets.h / secrets.example.h are found by main.cpp
	-Iinclude
